services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "127.0.0.1:3000:3000"
    command: ["pnpm", "--filter", "@workspace/api-server", "exec", "tsx", "./src/index.ts"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - WORKER_CONCURRENCY=4
    command: ["pnpm", "--filter", "@workspace/api-server", "exec", "tsx", "./src/worker.ts"]
