services:
  # 1. The Frontend Website (Renamed to force fresh deployment)
  - type: web
    name: cephlow-app
    runtime: static
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @workspace/cert-app build
    staticPublishPath: apps/cert-app/dist/public
    envVars:
      - key: VITE_API_URL
        value: https://certificate-api-imks.onrender.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://certificate-api-imks.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # 2. The Backend API
  - type: web
    name: certificate-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @workspace/api-server build
    startCommand: node apps/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --no-deprecation
      - key: ORIGIN
        value: https://cephlow-app.onrender.com
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
