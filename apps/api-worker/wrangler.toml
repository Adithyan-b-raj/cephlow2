name = "cephlow-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "5096a86bdc907570d94a855fde3a9fdd"

[[r2_buckets]]
binding = "CERTIFICATES"
bucket_name = "certificates"

[[kv_namespaces]]
binding = "CACHE"
id = "13731816cfc14103b71d4ea27d941aee"

[[d1_databases]]
binding = "DB"
database_name = "cephlow-app-db"
database_id = "1a89fd5a-ce1a-4af4-aaaf-1c3ebae2272b"

[vars]
R2_PUBLIC_URL = "https://pub-3e00f49622064202a04c19fb33ee2976.r2.dev"
PUBLIC_BASE_URL = "https://cephlow.in"
FRONTEND_URL = "https://cephlow.in"
GOOGLE_REDIRECT_URI = "https://api.cephlow.in/api/auth/google/callback"
ZEPTOMAIL_FROM_EMAIL = "certificate@cephlow.in"
WHATSAPP_TEMPLATE_NAME = "document_senderv3"
WHATSAPP_TEMPLATE_LANGUAGE = "en"
CREDIT_COST_GENERATION = "1"
R2_ACCOUNT_ID = "5096a86bdc907570d94a855fde3a9fdd"
R2_BUCKET_NAME = "certificates"
SUPABASE_URL = "https://dysaoofwlhebtkzqvfnn.supabase.co"
# Note: Secrets (SUPABASE_JWT_SECRET, ZEPTOMAIL_TOKEN, WHATSAPP_ACCESS_TOKEN, WHATSAPP_PHONE_NUMBER_ID,
# CREDITS_PER_RUPEE, CREDIT_COST_EMAIL, CREDIT_COST_WHATSAPP, MIN_RECHARGE_AMOUNT, etc.)
# will be injected via wrangler secrets or dashboard, NOT committed to source.
# Custom domain api.cephlow.in is configured via Cloudflare Dashboard:
# Workers & Pages → cephlow-api → Settings → Triggers → Custom Domains

[env.staging]
name = "cephlow-api-staging"

[[env.staging.r2_buckets]]
binding = "CERTIFICATES"
bucket_name = "certificates"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "13731816cfc14103b71d4ea27d941aee"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "cephlow-app-db"
database_id = "1a89fd5a-ce1a-4af4-aaaf-1c3ebae2272b"

[env.staging.vars]
R2_PUBLIC_URL = "https://pub-3e00f49622064202a04c19fb33ee2976.r2.dev"
PUBLIC_BASE_URL = "https://api-test.cephlow.in"
FRONTEND_URL = "https://test.cephlow.in"
GOOGLE_REDIRECT_URI = "https://api-test.cephlow.in/api/auth/google/callback"
ZEPTOMAIL_FROM_EMAIL = "certificate@cephlow.in"
WHATSAPP_TEMPLATE_NAME = "document_senderv3"
WHATSAPP_TEMPLATE_LANGUAGE = "en"
CREDIT_COST_GENERATION = "1"
R2_ACCOUNT_ID = "5096a86bdc907570d94a855fde3a9fdd"
R2_BUCKET_NAME = "certificates"
SUPABASE_URL = "https://dysaoofwlhebtkzqvfnn.supabase.co"
