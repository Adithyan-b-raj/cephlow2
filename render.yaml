services:
  # 1. The Backend API
  - type: web
    name: certificate-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @workspace/api-server build
    startCommand: node apps/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - fromContext: .env # Render can import your local .env file when you upload

  # 2. The Frontend Website
  - type: web
    name: certificate-web
    runtime: static
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @workspace/cert-app build
    staticPublishPath: apps/cert-app/dist/public
    routes:
      - type: rewrite
        source: /api/*
        destination: https://certificate-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
